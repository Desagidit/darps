id: study
name: The Study
aliases: [the office, Sir Edmund's study, the library]
# What people know about this room, by scope (household = staff + family).
shared_knowledge:
- scope: household
  content: Sir Edmund took brandy alone in the study most evenings, from ten
    o'clock; the household knew not to disturb him there.
description: 'Sir Edmund''s study: oak panelling, a coal fire burnt low, snow pressing at the tall window. The body has been laid on the chesterfield beneath a sheet, at the household''s insistence. His desk sits as he left it — papers, a green-shaded lamp, the brandy glass. A decanter stands on the sideboard. Present: Mr. Halloway keeps a respectful vigil by the door. Lady Ashworth sits very straight in the window chair.'
