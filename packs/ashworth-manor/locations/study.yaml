  - brandy
  - decanter
  - drink
  - sideboard
  - dregs
  - smell
scenery: 'Bookshelves of estate ledgers and military history; a cold fireplace grate with ordinary paper ash; hunting prints; a barometer; the snowbound view of the drive; a locked gun cabinet (key with the police, come dawn).'
